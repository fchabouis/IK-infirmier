<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infirmier le plus proche</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script data-goatcounter="https://fchabouis.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <script type="importmap">
  {
    "imports": {
      "@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"
    }
  }
  </script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
      color: #333;
    }
    h1 { font-size: 1.4rem; margin-bottom: 24px; }
    .search-container { position: relative; }
    input {
      width: 100%;
      padding: 12px 16px;
      font-size: 1rem;
      border: 2px solid #ddd;
      border-radius: 8px;
      outline: none;
    }
    input:focus { border-color: #4a90d9; }
    .suggestions {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: white;
      border: 1px solid #ddd;
      border-top: none;
      border-radius: 0 0 8px 8px;
      list-style: none;
      z-index: 1000;
      display: none;
    }
    .suggestions li {
      padding: 10px 16px;
      cursor: pointer;
    }
    .suggestions li:hover { background: #f0f4ff; }
    #map {
      width: 100%;
      height: 400px;
      margin-top: 20px;
      border-radius: 8px;
      border: 1px solid #ddd;
      display: none;
    }
    #results {
      margin-top: 16px;
      display: none;
    }
    .result-card {
      padding: 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .result-card:hover { background: #fafafa; }
    .result-card.closest {
      border-color: #4a90d9;
      background: #f0f4ff;
    }
    .result-card .name { font-weight: 600; margin-bottom: 4px; }
    .result-card .distance { color: #555; }
    .result-card .duration { color: #888; font-size: 0.9rem; }
    .badge {
      display: inline-block;
      background: #4a90d9;
      color: white;
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 4px;
      margin-left: 8px;
    }
    #loading {
      display: none;
      margin-top: 16px;
      color: #888;
    }
    #error {
      display: none;
      margin-top: 16px;
      color: #c0392b;
    }
    .legend {
      display: flex;
      gap: 16px;
      margin-top: 8px;
      font-size: 0.85rem;
      color: #666;
    }
    .legend-item { display: flex; align-items: center; gap: 4px; }
    .legend-color {
      width: 20px;
      height: 4px;
      border-radius: 2px;
    }
    #add-cabinet-btn {
      padding: 8px 16px;
      background: #27ae60;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
    }
    #add-cabinet-btn:hover { background: #219a52; }
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: white;
      border-radius: 12px;
      padding: 24px;
      max-width: 500px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal h2 { font-size: 1.15rem; margin-bottom: 16px; }
    .modal label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 4px;
      margin-top: 12px;
    }
    .modal label:first-of-type { margin-top: 0; }
    .modal .search-container { margin-bottom: 0; }
    #modal-map {
      width: 100%;
      height: 250px;
      border-radius: 8px;
      border: 1px solid #ddd;
      margin-top: 12px;
      display: none;
    }
    .modal-buttons {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }
    .modal-buttons button {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-cancel {
      background: white;
      border: 2px solid #ddd;
      color: #555;
    }
    .btn-cancel:hover { background: #f5f5f5; }
    .btn-submit {
      background: #4a90d9;
      border: none;
      color: white;
    }
    .btn-submit:hover { background: #3a7bc8; }
    .btn-submit:disabled { background: #a0c4e8; cursor: not-allowed; }
    .modal-success {
      color: #27ae60;
      font-weight: 600;
      margin-top: 12px;
      display: none;
    }
    .modal-error {
      color: #c0392b;
      font-weight: 600;
      margin-top: 12px;
      display: none;
    }
  </style>
</head>
<body>
  <h1>Trouver le cabinet infirmier le plus proche</h1>

  <div class="search-container">
    <input type="text" id="address" placeholder="Saisissez une adresse..." autocomplete="off">
    <ul class="suggestions" id="suggestions"></ul>
  </div>

  <div id="loading">Calcul des itinéraires en cours...</div>
  <div id="error"></div>
  <div id="map"></div>
  <div id="add-cabinet-container" style="display:none; text-align:right; margin-top:12px;">
    <button id="add-cabinet-btn" style="display:inline-block;">Ajouter un cabinet manquant</button>
  </div>
  <div id="results"></div>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h2>Ajouter un cabinet infirmier</h2>
      <label for="modal-address">Adresse *</label>
      <div class="search-container">
        <input type="text" id="modal-address" placeholder="Saisissez l'adresse du cabinet..." autocomplete="off">
        <ul class="suggestions" id="modal-suggestions"></ul>
      </div>
      <input type="hidden" id="modal-lat">
      <input type="hidden" id="modal-lng">
      <div id="modal-map"></div>
      <label for="modal-prenom">Pr&eacute;nom (optionnel)</label>
      <input type="text" id="modal-prenom" placeholder="Pr&eacute;nom">
      <label for="modal-nom">Nom (optionnel)</label>
      <input type="text" id="modal-nom" placeholder="Nom">
      <div class="modal-success" id="modal-success">Cabinet ajout&eacute; avec succ&egrave;s !</div>
      <div class="modal-error" id="modal-error"></div>
      <div class="modal-buttons">
        <button class="btn-cancel" id="modal-cancel">Annuler</button>
        <button class="btn-submit" id="modal-submit" disabled>Valider</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { fetchNearby, addInfirmary } from './nurses_api.js';

    const ROUTE_COLORS = ["#2563eb", "#e67e22", "#8e44ad", "#27ae60", "#c0392b"];

const addressInput = document.getElementById("address");
    const suggestionsList = document.getElementById("suggestions");
    const resultsDiv = document.getElementById("results");
    const loadingDiv = document.getElementById("loading");
    const errorDiv = document.getElementById("error");
    const mapDiv = document.getElementById("map");

    let map = null;
    let mapLayers = [];
    let debounceTimer;
    let currentFeatures = [];
    let selectedIndex = -1;
    let lastSearchLon = null;
    let lastSearchLat = null;

    function initMap() {
      if (map) return;
      mapDiv.style.display = "block";
      map = L.map("map");
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
        maxZoom: 18,
      }).addTo(map);
    }

    function clearMap() {
      mapLayers.forEach(l => map.removeLayer(l));
      mapLayers = [];
    }

    // Autocomplétion BAN
    addressInput.addEventListener("input", () => {
      clearTimeout(debounceTimer);
      selectedIndex = -1;
      const q = addressInput.value.trim();
      if (q.length < 3) { suggestionsList.style.display = "none"; return; }
      debounceTimer = setTimeout(() => fetchSuggestions(q), 300);
    });

    addressInput.addEventListener("keydown", (e) => {
      const items = suggestionsList.querySelectorAll("li");
      if (!items.length || suggestionsList.style.display === "none") return;

      if (e.key === "ArrowDown") {
        e.preventDefault();
        selectedIndex = Math.min(selectedIndex + 1, items.length - 1);
        updateSelection(items);
      } else if (e.key === "ArrowUp") {
        e.preventDefault();
        selectedIndex = Math.max(selectedIndex - 1, 0);
        updateSelection(items);
      } else if (e.key === "Enter") {
        e.preventDefault();
        if (selectedIndex >= 0) selectAddress(currentFeatures[selectedIndex]);
      }
    });

    function updateSelection(items) {
      items.forEach((li, i) => {
        li.style.background = i === selectedIndex ? "#f0f4ff" : "";
      });
    }

    async function fetchSuggestions(q) {
      try {
        const res = await fetch(`https://api-adresse.data.gouv.fr/search/?q=${encodeURIComponent(q)}&limit=5`);
        const data = await res.json();
        suggestionsList.innerHTML = "";
        currentFeatures = data.features;
        selectedIndex = -1;
        if (!data.features.length) { suggestionsList.style.display = "none"; return; }
        data.features.forEach((f, i) => {
          const li = document.createElement("li");
          li.textContent = f.properties.label;
          li.addEventListener("click", () => selectAddress(f));
          li.addEventListener("mouseenter", () => {
            selectedIndex = i;
            updateSelection(suggestionsList.querySelectorAll("li"));
          });
          suggestionsList.appendChild(li);
        });
        suggestionsList.style.display = "block";
      } catch (e) {
        suggestionsList.style.display = "none";
      }
    }

    async function selectAddress(feature) {
      const [lon, lat] = feature.geometry.coordinates;
      addressInput.value = feature.properties.label;
      suggestionsList.style.display = "none";
      lastSearchLon = lon;
      lastSearchLat = lat;
      window.goatcounter?.count({ path: "recherche/" + feature.properties.label, title: "Recherche adresse", event: true });
      await computeRoutes(lon, lat);
    }

    const MAX_ROUTING_CALLS = 3;

    async function computeRoutes(startLon, startLat) {
      loadingDiv.style.display = "block";
      resultsDiv.style.display = "none";
      errorDiv.style.display = "none";

      try {
        const nearby = await fetchNearby(startLat, startLon, MAX_ROUTING_CALLS);

        const promises = nearby.map(inf =>
          fetch("https://data.geopf.fr/navigation/itineraire", {
            method: "POST",
            headers: { "Accept": "application/json", "Content-Type": "application/json" },
            body: JSON.stringify({
              resource: "bdtopo-osrm",
              start: `${startLon},${startLat}`,
              end: `${inf.longitude},${inf.latitude}`,
              profile: "car",
              getSteps: false,
              getBbox: false,
              geometryFormat: "geojson",
            }),
          })
          .then(r => r.json())
          .then(data => ({
            name: (inf.prenom || inf.nom) ? `${inf.prenom ?? ''} ${inf.nom ?? ''}`.trim() : 'Nom inconnu',
            lat: inf.latitude,
            lon: inf.longitude,
            distance: data.distance,
            duration: data.duration,
            geometry: data.geometry,
          }))
        );

        const results = await Promise.all(promises);
        results.sort((a, b) => a.distance - b.distance);
        displayResults(results, startLat, startLon);
      } catch (e) {
        errorDiv.textContent = "Erreur lors du calcul d'itinéraire. Veuillez réessayer.";
        errorDiv.style.display = "block";
      } finally {
        loadingDiv.style.display = "none";
      }
    }

    function formatDistance(meters) {
      return meters >= 1000
        ? (meters / 1000).toFixed(1) + " km"
        : Math.round(meters) + " m";
    }

    function formatDuration(seconds) {
      const mins = Math.round(seconds / 60);
      if (mins < 60) return mins + " min";
      const h = Math.floor(mins / 60);
      const m = mins % 60;
      return h + " h " + (m > 0 ? m + " min" : "");
    }

    function displayResults(results, startLat, startLon) {
      // Carte
      initMap();
      clearMap();

      const bounds = L.latLngBounds();

      // Marqueur de départ
      const startMarker = L.marker([startLat, startLon], {
        icon: L.divIcon({
          className: "",
          html: `<div style="background:#e74c3c;width:14px;height:14px;border-radius:50%;border:3px solid white;box-shadow:0 1px 4px rgba(0,0,0,.4)"></div>`,
          iconSize: [14, 14],
          iconAnchor: [7, 7],
        }),
      }).addTo(map).bindPopup("<b>Votre adresse</b>");
      mapLayers.push(startMarker);
      bounds.extend([startLat, startLon]);

      // Tracés et marqueurs cabinets
      const routeLayersMap = {};
      results.forEach((r, i) => {
        const color = ROUTE_COLORS[i % ROUTE_COLORS.length];

        // Tracé de l'itinéraire
        if (r.geometry) {
          const routeLine = L.geoJSON(r.geometry, {
            style: {
              color: color,
              weight: i === 0 ? 5 : 3,
              opacity: i === 0 ? 0.9 : 0.5,
            },
          }).addTo(map);
          mapLayers.push(routeLine);
          routeLayersMap[r.name] = { line: routeLine, color, index: i };
          routeLine.getBounds().pad(0.05);
          bounds.extend(routeLine.getBounds());
        }

        // Marqueur cabinet
        const cabMarker = L.marker([r.lat, r.lon], {
          icon: L.divIcon({
            className: "",
            html: `<div style="background:${color};color:white;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:13px;border:3px solid white;box-shadow:0 1px 4px rgba(0,0,0,.4)">${i + 1}</div>`,
            iconSize: [24, 24],
            iconAnchor: [12, 12],
          }),
        }).addTo(map).bindPopup(`<b>${r.name}</b><br>${formatDistance(r.distance)} — ${formatDuration(r.duration)}`);
        mapLayers.push(cabMarker);
        bounds.extend([r.lat, r.lon]);
      });

      map.fitBounds(bounds, { padding: [30, 30] });

      // Liste des résultats
      resultsDiv.innerHTML = "";
      results.forEach((r, i) => {
        const color = ROUTE_COLORS[i % ROUTE_COLORS.length];
        const card = document.createElement("div");
        card.className = "result-card" + (i === 0 ? " closest" : "");
        card.innerHTML = `
          <div class="name">
            <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${color};margin-right:6px"></span>
            ${r.name}${i === 0 ? '<span class="badge">Le plus proche</span>' : ""}
          </div>
          <div class="distance">${formatDistance(r.distance)}</div>
          <div class="duration">${formatDuration(r.duration)} en voiture</div>
        `;
        // Survol → mettre en avant le tracé
        card.addEventListener("mouseenter", () => highlightRoute(r.name, routeLayersMap));
        card.addEventListener("mouseleave", () => resetRoutes(results, routeLayersMap));
        resultsDiv.appendChild(card);
      });
      resultsDiv.style.display = "block";
      document.getElementById("add-cabinet-container").style.display = "block";
    }

    function highlightRoute(name, routeLayersMap) {
      Object.entries(routeLayersMap).forEach(([n, { line, index }]) => {
        line.setStyle({ weight: n === name ? 6 : 2, opacity: n === name ? 1 : 0.2 });
      });
    }

    function resetRoutes(results, routeLayersMap) {
      Object.entries(routeLayersMap).forEach(([n, { line, index }]) => {
        line.setStyle({ weight: index === 0 ? 5 : 3, opacity: index === 0 ? 0.9 : 0.5 });
      });
    }

    // Fermer les suggestions en cliquant ailleurs
    document.addEventListener("click", (e) => {
      if (!e.target.closest(".search-container")) {
        suggestionsList.style.display = "none";
        modalSuggestions.style.display = "none";
      }
    });

    // --- Modal : Ajouter un cabinet ---
    const addBtn = document.getElementById("add-cabinet-btn");
    const modalOverlay = document.getElementById("modal-overlay");
    const modalAddress = document.getElementById("modal-address");
    const modalSuggestions = document.getElementById("modal-suggestions");
    const modalLatInput = document.getElementById("modal-lat");
    const modalLngInput = document.getElementById("modal-lng");
    const modalMapDiv = document.getElementById("modal-map");
    const modalPrenom = document.getElementById("modal-prenom");
    const modalNom = document.getElementById("modal-nom");
    const modalSubmit = document.getElementById("modal-submit");
    const modalCancel = document.getElementById("modal-cancel");
    const modalSuccess = document.getElementById("modal-success");
    const modalError = document.getElementById("modal-error");

    let modalMap = null;
    let modalMarker = null;
    let modalDebounce;
    let modalFeatures = [];
    let modalSelectedIndex = -1;

    addBtn.addEventListener("click", () => {
      modalOverlay.classList.add("active");
      modalAddress.value = "";
      modalLatInput.value = "";
      modalLngInput.value = "";
      modalPrenom.value = "";
      modalNom.value = "";
      modalSubmit.disabled = true;
      modalMapDiv.style.display = "none";
      modalSuccess.style.display = "none";
      modalError.style.display = "none";
      modalSuggestions.style.display = "none";
      setTimeout(() => modalAddress.focus(), 100);
    });

    modalCancel.addEventListener("click", () => {
      modalOverlay.classList.remove("active");
    });

    modalOverlay.addEventListener("click", (e) => {
      if (e.target === modalOverlay) modalOverlay.classList.remove("active");
    });

    // Autocomplétion dans la modal
    modalAddress.addEventListener("input", () => {
      clearTimeout(modalDebounce);
      modalSelectedIndex = -1;
      const q = modalAddress.value.trim();
      if (q.length < 3) { modalSuggestions.style.display = "none"; return; }
      modalDebounce = setTimeout(() => fetchModalSuggestions(q), 300);
    });

    modalAddress.addEventListener("keydown", (e) => {
      const items = modalSuggestions.querySelectorAll("li");
      if (!items.length || modalSuggestions.style.display === "none") return;
      if (e.key === "ArrowDown") {
        e.preventDefault();
        modalSelectedIndex = Math.min(modalSelectedIndex + 1, items.length - 1);
        items.forEach((li, i) => li.style.background = i === modalSelectedIndex ? "#f0f4ff" : "");
      } else if (e.key === "ArrowUp") {
        e.preventDefault();
        modalSelectedIndex = Math.max(modalSelectedIndex - 1, 0);
        items.forEach((li, i) => li.style.background = i === modalSelectedIndex ? "#f0f4ff" : "");
      } else if (e.key === "Enter") {
        e.preventDefault();
        if (modalSelectedIndex >= 0) selectModalAddress(modalFeatures[modalSelectedIndex]);
      }
    });

    async function fetchModalSuggestions(q) {
      try {
        const res = await fetch(`https://api-adresse.data.gouv.fr/search/?q=${encodeURIComponent(q)}&limit=5`);
        const data = await res.json();
        modalSuggestions.innerHTML = "";
        modalFeatures = data.features;
        modalSelectedIndex = -1;
        if (!data.features.length) { modalSuggestions.style.display = "none"; return; }
        data.features.forEach((f, i) => {
          const li = document.createElement("li");
          li.textContent = f.properties.label;
          li.addEventListener("click", () => selectModalAddress(f));
          li.addEventListener("mouseenter", () => {
            modalSelectedIndex = i;
            modalSuggestions.querySelectorAll("li").forEach((el, j) => el.style.background = j === i ? "#f0f4ff" : "");
          });
          modalSuggestions.appendChild(li);
        });
        modalSuggestions.style.display = "block";
      } catch (e) {
        modalSuggestions.style.display = "none";
      }
    }

    function selectModalAddress(feature) {
      const [lon, lat] = feature.geometry.coordinates;
      modalAddress.value = feature.properties.label;
      modalSuggestions.style.display = "none";
      modalLatInput.value = lat;
      modalLngInput.value = lon;
      modalSubmit.disabled = false;

      // Afficher mini carte
      modalMapDiv.style.display = "block";
      if (!modalMap) {
        modalMap = L.map("modal-map");
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
          maxZoom: 18,
        }).addTo(modalMap);
      }
      if (modalMarker) modalMap.removeLayer(modalMarker);
      modalMarker = L.marker([lat, lon]).addTo(modalMap);
      modalMap.setView([lat, lon], 16);
      setTimeout(() => modalMap.invalidateSize(), 100);
    }

    modalSubmit.addEventListener("click", async () => {
      modalSubmit.disabled = true;
      modalError.style.display = "none";
      modalSuccess.style.display = "none";
      try {
        await addInfirmary({
          latitude: parseFloat(modalLatInput.value),
          longitude: parseFloat(modalLngInput.value),
          prenom: modalPrenom.value.trim() || null,
          nom: modalNom.value.trim() || null,
        });
        modalOverlay.classList.remove("active");
        addBtn.textContent = "Cabinet ajouté avec succès !";
        addBtn.style.background = "#27ae60";
        setTimeout(() => {
          addBtn.textContent = "Ajouter un cabinet manquant";
          addBtn.style.background = "";
        }, 3000);
        if (lastSearchLon !== null && lastSearchLat !== null) {
          await computeRoutes(lastSearchLon, lastSearchLat);
        }
      } catch (e) {
        modalError.textContent = "Erreur lors de l'ajout. Veuillez réessayer.";
        modalError.style.display = "block";
        modalSubmit.disabled = false;
      }
    });
  </script>
</body>
</html>
